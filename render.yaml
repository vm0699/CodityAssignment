# Render Blueprint — deploys the whole backend (Postgres + api + worker +
# scheduler) from a single repo in one click ("New +" -> "Blueprint" ->
# paste this repo's URL). Frontend (apps/web) is deployed separately to
# Vercel — see docs/DEPLOYMENT.md.
#
# Free-tier note: Render's free plan only keeps "web service" deployments
# alive continuously (background workers require a paid plan), so worker and
# scheduler are declared as `type: web` here too. They bind a bare health
# endpoint on $PORT and self-ping their own URL every 10 minutes to avoid the
# platform's 15-minute idle spin-down — see packages/core/src/keepalive.ts.
# This is a disclosed trade-off for free-tier hosting, not hidden behavior.

databases:
  - name: pulse-db
    databaseName: pulse
    user: pulse
    plan: free

services:
  - type: web
    name: pulse-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: pulse-db, property: connectionString }
      - key: JWT_SECRET
        generateValue: true
      - key: API_PORT
        value: "4000"
      - key: CORS_ORIGIN
        value: "*"          # tighten to your Vercel URL after the frontend is deployed
      - key: RATE_LIMIT_PER_MINUTE
        value: "300"
      - key: RUN_MIGRATIONS
        value: "true"       # api applies migrations on boot; worker/scheduler skip it

  - type: web
    name: pulse-worker
    runtime: docker
    dockerfilePath: ./apps/worker/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: pulse-db, property: connectionString }
      - key: WORKER_CONCURRENCY
        value: "5"
      - key: RUN_MIGRATIONS
        value: "false"

  - type: web
    name: pulse-scheduler
    runtime: docker
    dockerfilePath: ./apps/scheduler/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: pulse-db, property: connectionString }
      - key: SCHEDULER_TICK_MS
        value: "1000"
      - key: RUN_MIGRATIONS
        value: "false"
